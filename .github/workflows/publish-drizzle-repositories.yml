name: Publish drizzle-repositories

on:
  push:
    branches: [main]
    paths:
      - "packages/drizzle_repositories/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test-drizzle-repositories.yml

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci
        working-directory: packages/drizzle_repositories

      - name: Build
        run: npm run build
        working-directory: packages/drizzle_repositories

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/drizzle_repositories
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}
